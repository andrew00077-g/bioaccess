<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BioAccess - Registro de Estudiantes</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body class="bg-slate-900 font-sans text-slate-100">

    <!-- ================= NAV ================= -->

    <nav
      class="bg-slate-800 border-b border-slate-700 px-8 py-4 flex justify-between items-center sticky top-0 z-50"
    >

      <div class="flex items-center gap-3">

        <div class="bg-blue-600 p-2 rounded-lg">
          <i class="fas fa-fingerprint text-2xl text-white"></i>
        </div>

        <h1 class="text-xl font-bold uppercase">
          BioAccess
          <span class="text-blue-400 font-light">
            Registro
          </span>
        </h1>

      </div>

      <div class="flex items-center gap-6">

        <a
          href="materias.html"
          class="text-slate-400 hover:text-emerald-400 font-bold text-sm"
        >
          <i class="fas fa-book mr-1"></i>
          Materias
        </a>

        <a
          href="asistencia.html"
          class="text-slate-400 hover:text-emerald-400 font-bold text-sm"
        >
          <i class="fas fa-clipboard-check mr-1"></i>
          Asistencia
        </a>

      </div>

    </nav>

    <!-- ================= MAIN ================= -->

    <main
      class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8"
    >

      <!-- ================= FORM ================= -->

      <div class="lg:col-span-4 space-y-6">

        <section
          class="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl"
        >

          <h2
            class="text-lg font-bold mb-6 flex items-center gap-2 text-blue-400"
          >
            <i class="fas fa-user-plus"></i>
            Enrolar Estudiante
          </h2>

          <div class="space-y-5">

            <div>

              <label class="text-[10px] font-bold text-slate-500 uppercase">
                ID Sensor
              </label>

              <input
                id="reg-id"
                type="number"
                placeholder="Ej: 5"
                class="w-full mt-1 p-3 bg-slate-900 border border-slate-700 rounded-xl text-white"
              />

            </div>

            <div>

              <label class="text-[10px] font-bold text-slate-500 uppercase">
                Nombre
              </label>

              <input
                id="reg-nombre"
                type="text"
                placeholder="Ej: Mauricio"
                class="w-full mt-1 p-3 bg-slate-900 border border-slate-700 rounded-xl text-white"
              />

            </div>

            <div>

              <label class="text-[10px] font-bold text-slate-500 uppercase">
                Apellido
              </label>

              <input
                id="reg-apellido"
                type="text"
                placeholder="Ej: Pando"
                class="w-full mt-1 p-3 bg-slate-900 border border-slate-700 rounded-xl text-white"
              />

            </div>

            <button
              onclick="registrarEstudiante()"
              class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold"
            >

              <i class="fas fa-save mr-2"></i>

              Guardar e Iniciar Sensor

            </button>

          </div>

        </section>

        <!-- ================= ESTADO ================= -->

        <section
          class="bg-slate-800 p-8 rounded-3xl border border-slate-700"
        >

          <p class="text-[10px] uppercase text-slate-500 font-bold mb-2">
            Estado del Sensor
          </p>

          <h2
            id="live-modo"
            class="text-2xl font-black text-emerald-400"
          >
            Lectura
          </h2>

          <p
            id="sensor-instruccion"
            class="text-sm text-slate-400 mt-3"
          >
            Sensor listo para asistencia.
          </p>

        </section>

      </div>

      <!-- ================= TABLA ================= -->

      <div class="lg:col-span-8">

        <section
          class="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden"
        >

          <div
            class="p-8 border-b border-slate-700 flex justify-between items-center"
          >

            <div>

              <h2 class="text-xl font-bold">
                Estudiantes Registrados
              </h2>

              <p class="text-xs text-slate-500 mt-1">
                Lista de estudiantes
              </p>

            </div>

            <span
              id="total-count"
              class="px-4 py-2 bg-slate-900 text-blue-400 rounded-xl text-xs font-black"
            >
              0 Estudiantes
            </span>

          </div>

          <div class="overflow-x-auto">

            <table class="w-full text-left">

              <thead>

                <tr
                  class="bg-slate-900/50 text-slate-500 text-[10px] uppercase font-black"
                >

                  <th class="px-8 py-4">ID</th>
                  <th class="px-8 py-4">Nombre</th>
                  <th class="px-8 py-4">Fecha</th>
                  <th class="px-8 py-4 text-right">Acciones</th>

                </tr>

              </thead>

              <tbody
                id="lista-estudiantes"
                class="divide-y divide-slate-700"
              ></tbody>

            </table>

          </div>

        </section>

      </div>

    </main>

    <!-- ================= SCRIPT ================= -->

    <script>

      // ================= REGISTRAR =================

      async function registrarEstudiante() {

        try {

          const id =
            document.getElementById("reg-id").value.trim();

          const nombre =
            document.getElementById("reg-nombre").value.trim();

          const apellido =
            document.getElementById("reg-apellido").value.trim();

          if (!id || !nombre || !apellido) {

            alert("Complete todos los campos");

            return;
          }

          // ================= GUARDAR =================

          const respuesta =
            await fetch("api/registrar_estudiante.php", {

              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify({
                id,
                nombre,
                apellido,
              }),

            });

          const data = await respuesta.json();

          console.log(data);

          if (!data.success) {

            alert(data.error || "No se pudo registrar");

            return;
          }

          // ================= ACTIVAR SENSOR =================

          const activar =
            await fetch("api/activar_registro.php", {

              method: "POST",

              headers: {
                "Content-Type": "application/json",
              },

              body: JSON.stringify({
                id,
              }),

            });

          const activarData = await activar.json();

          console.log(activarData);

          if (!activarData.success) {

            alert("No se pudo activar el sensor");

            return;
          }

          alert("Sensor activado. Coloque el dedo.");

          // ================= LIMPIAR =================

          document.getElementById("reg-id").value = "";
          document.getElementById("reg-nombre").value = "";
          document.getElementById("reg-apellido").value = "";

          cargarEstudiantes();

          cargarEstadoSistema();

        } catch (error) {

          console.log(error);

          alert("Error de conexión con servidor");

        }

      }

      // ================= ESTADO SISTEMA =================

      async function cargarEstadoSistema() {

        try {

          const respuesta =
            await fetch("api/estado_sistema.php");

          const sistema = await respuesta.json();

          const modo =
            document.getElementById("live-modo");

          const texto =
            document.getElementById("sensor-instruccion");

          if (parseInt(sistema.modo) === 1) {

            modo.innerText = "REGISTRANDO";

            modo.className =
              "text-2xl font-black text-yellow-400 animate-pulse";

            texto.innerText =
              "El sensor espera una nueva huella.";

          } else {

            modo.innerText = "LECTURA";

            modo.className =
              "text-2xl font-black text-emerald-400";

            texto.innerText =
              "Sensor listo para asistencia.";

          }

        } catch (error) {

          console.log(error);

        }

      }

      // ================= LISTAR =================

      async function cargarEstudiantes() {

        const respuesta =
          await fetch("api/listar_estudiantes.php");

        const estudiantes =
          await respuesta.json();

        const lista =
          document.getElementById("lista-estudiantes");

        lista.innerHTML = "";

        if (estudiantes.length === 0) {

          lista.innerHTML = `
            <tr>
              <td colspan="4"
              class="p-10 text-center text-slate-500">
                No hay estudiantes
              </td>
            </tr>
          `;

          return;
        }

        estudiantes.forEach((est) => {

          lista.innerHTML += `
          
          <tr class="hover:bg-slate-700/20">

            <td class="px-8 py-5">
              <span class="text-blue-400 font-bold">
                #${est.id}
              </span>
            </td>

            <td class="px-8 py-5">

              <div class="font-bold uppercase">
                ${est.nombre}
              </div>

              <div class="text-xs text-slate-500 uppercase">
                ${est.apellido}
              </div>

            </td>

            <td class="px-8 py-5 text-slate-400 text-xs">
              ${est.fecha_registro}
            </td>

            <td class="px-8 py-5 text-right">

              <button
                onclick="borrarEstudiante(${est.id})"
                class="text-red-500"
              >
                <i class="fas fa-trash"></i>
              </button>

            </td>

          </tr>

          `;
        });

        document.getElementById("total-count").innerText =
          estudiantes.length + " Estudiantes";

      }

      // ================= BORRAR =================

      async function borrarEstudiante(id) {

        if (!confirm("¿Eliminar estudiante?")) {
          return;
        }

        const respuesta =
          await fetch(
            "api/eliminar_estudiante.php?id=" + id
          );

        const data = await respuesta.json();

        if (data.success) {

          cargarEstudiantes();

        } else {

          alert("No se pudo eliminar");

        }

      }

      // ================= INIT =================

      cargarEstudiantes();

      cargarEstadoSistema();

      setInterval(cargarEstadoSistema, 2000);

    </script>

  </body>
</html>
